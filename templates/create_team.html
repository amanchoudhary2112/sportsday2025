<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Team - NIELIT Sports Day 2025</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .flag-strip {
      background: linear-gradient(to right, #FF9933 33%, #FFFFFF 33%, #FFFFFF 66%, #138808 66%);
      height: 6px;
    }

    .tricolor-underline {
      height: 4px;
      width: 100px;
      background: linear-gradient(to right, #FF9933, #FFFFFF, #138808);
      margin: 0 auto;
    }
  </style>
</head>
<body class="bg-[#fefefe] text-gray-900">

  <!-- Header -->
  <header class="bg-[#0f3f8f] py-4 shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex flex-wrap justify-between items-center">
      <div class="flex items-center space-x-3">
        <img src="{{ url_for('static', filename='images/NIELIT_Logo copy.png') }}" alt="NIELIT Logo" class="h-10 bg-white rounded p-1 shadow">
        <h1 class="text-xl md:text-2xl font-bold text-white">National Sports Day 2025</h1>
      </div>
      <nav class="mt-2 md:mt-0 space-x-4 text-white text-sm md:text-base font-medium">
        <a href="/" class="hover:underline">Home</a>
      </nav>
    </div>
  </header>

  <!-- Tricolor Strip -->
  <div class="flag-strip"></div>

  <!-- Team Registration Form -->
  <section class="py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-xl p-8 border border-gray-200">
      <h2 class="text-2xl md:text-3xl font-extrabold text-center text-[#0f3f8f] mb-2">Build Your Dream Team</h2>
      <div class="tricolor-underline mb-4"></div>
      <p class="text-center text-gray-600 mb-8">Let’s celebrate <strong>National Sports Day</strong> by showing your team spirit!</p>


      <form method="POST" class="space-y-5" id="teamForm">
        <input type="text" name="team_name" placeholder="Team Name" required class="w-full p-3 border-2 border-orange-400 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500"/>

        <select name="sport" required class="w-full p-3 border-2 border-green-500 rounded-md focus:outline-none focus:ring-2 focus:ring-green-600">
          <option value="">-- Select Sport --</option>
          {% for s in sports %}
          <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>

        <input type="text" name="leader" placeholder="Team Leader Name" required class="w-full p-3 border-2 border-blue-400 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"/>

        <input type="text" name="roll_no" placeholder="Team Leader Roll No." required class="w-full p-3 border-2 border-blue-400 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"/>

        <!-- Team Members Container -->
        <div id="membersContainer" class="space-y-4">
          <input type="text" name="member1" placeholder="Member 1 (optional)" class="w-full p-3 border-2 border-gray-300 rounded-md"/>
          <input type="text" name="member2" placeholder="Member 2 (optional)" class="w-full p-3 border-2 border-gray-300 rounded-md"/>
        </div>

        <!-- Add More Members Button -->
        <div class="text-center">
          <button type="button" id="addMemberBtn" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition">
            + Add More Members
          </button>
        </div>

        <div class="text-center pt-4">
          <button type="submit" class="bg-gradient-to-r from-orange-400 via-white to-green-600 text-black px-6 py-3 rounded-full font-semibold hover:scale-105 transition shadow-md">
            Submit Team
          </button>
        </div>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-[#138808] text-white py-4 mt-10">
    <div class="text-center text-sm font-medium">
      © 2025 NIELIT Sports Day Committee.
    </div>
  </footer>

  <script>
    let memberCount = 2;
    document.getElementById("addMemberBtn").addEventListener("click", function() {
      memberCount++;
      const container = document.getElementById("membersContainer");
      const input = document.createElement("input");
      input.type = "text";
      input.name = `member${memberCount}`;
      input.placeholder = `Member ${memberCount} (optional)`;
      input.className = "w-full p-3 border-2 border-gray-300 rounded-md";
      container.appendChild(input);
    });
  </script>

</body>
</html>
